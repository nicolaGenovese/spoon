<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wetherspoon Pub Race</title>

  <!-- Leaflet fornisce la mappa interattiva basata su OpenStreetMap. -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="styles.css" />

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <!-- Supabase e configurazione cloud sono opzionali: se disattivati resta localStorage. -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="cloud-config.js"></script>
  <script src="app.js" defer></script>
</head>
<body>
  <main class="app">
    <!-- Sidebar: stato, giocatori, ricerca, contatori e risultati. -->
    <aside>
      <div class="brand">
        <div class="logo">JDW</div>
        <div>
          <h1>Wetherspoon Pub Race</h1>
          <div class="subtitle">Daniel, Stefano e Nicola</div>
        </div>
      </div>

      <div class="panel status-panel">
        <div id="status" class="status" role="status" aria-live="polite">
          <span id="statusDot" class="dot"></span>
          <span id="statusText">Caricamento dati pub dall'API Wetherspoon...</span>
        </div>
      </div>

      <div class="panel">
        <label>Giocatore attivo</label>
        <div id="playerPicker" class="player-picker"></div>
      </div>

      <div class="panel filters-panel">
        <label>Vista</label>
        <div id="filterTabs" class="filter-tabs" role="group" aria-label="Filtro pub"></div>
      </div>

      <div class="panel search-panel">
        <div class="panel-heading">
          <label for="searchInput">Ricerca pub</label>
          <span id="resultSummary" class="result-summary">0 risultati</span>
        </div>
        <input id="searchInput" type="search" placeholder="Cerca nome, città, postcode, regione..." />
        <div class="row search-actions">
          <button id="fitBtn">Centra mappa</button>
          <button id="clearBtn" class="secondary">Reset</button>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <strong id="claimedCount">0</strong>
          <span>visite validate</span>
        </div>
        <div class="stat">
          <strong id="pendingCount">0</strong>
          <span>in attesa</span>
        </div>
        <div class="stat">
          <strong id="unclaimedCount">0</strong>
          <span>pub liberi</span>
        </div>
        <div class="stat">
          <strong id="totalCount">0</strong>
          <span>pub totali</span>
        </div>
        <div class="stat">
          <strong id="visibleCount">0</strong>
          <span>risultati visibili</span>
        </div>
      </div>

      <!-- Lista popolata dinamicamente dopo il caricamento dell'API. -->
      <div id="results" class="results" aria-label="Risultati pub">
        <div class="empty">Caricamento dati in corso...</div>
      </div>
    </aside>

    <section id="map" aria-label="Mappa interattiva dei pub"></section>
  </main>
</body>
</html>
